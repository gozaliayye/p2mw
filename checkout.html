<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - NataDoc</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <!-- SVG Sprite (sama persis dengan index.html) -->
    <svg width="0" height="0" style="position:absolute">
        <symbol id="icon-chat" viewBox="0 0 24 24" fill="currentColor">
            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/>
        </symbol>
        <symbol id="icon-bell" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
        </symbol>
        <symbol id="icon-user" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </symbol>
    </svg>

    <header>
        <nav class="container">
            <a href="index.html" class="brand-logo">
                <img src="assets/images/logo-natadoc.png" alt="NataDoc Logo">
                <span class="logo-text">Nata<span>Doc</span></span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Beranda</a></li>
                <li><a href="layanan.html">Layanan Kami</a></li>
                <li><a href="konsultasi.html">
                    <svg class="icon nav-icon"><use xlink:href="#icon-chat"></use></svg>
                    Konsultasi
                </a></li>
                <li><a href="notifications.html" title="Notifikasi">
                    <svg class="icon nav-icon"><use xlink:href="#icon-bell"></use></svg>
                </a></li>
                <li><a href="profile.html" title="Profil">
                    <svg class="icon nav-icon"><use xlink:href="#icon-user"></use></svg>
                </a></li>
                <li><a href="login.html" id="auth-link">Login</a></li>
            </ul>
        </nav>
    </header>

    <main class="container page-content">
        <h2>Checkout Layanan</h2>

        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 2rem;">

            <div class="form-card" style="margin: 0; max-width: 100%;">
                <h3>Detail Lokasi & Jadwal</h3>
                <form id="checkout-form">
                    <div class="form-group">
                        <label>Tanggal Rencana Survey / Pengerjaan</label>
                        <input type="date" id="input-date" required>
                    </div>
                    <div class="form-group">
                        <label>Alamat Lengkap Lokasi Arsip</label>
                        <textarea id="input-address" rows="3" placeholder="Nama Jalan, Gedung, Lantai, Ruangan..." required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Catatan Tambahan</label>
                        <textarea id="input-notes" rows="2" placeholder="Contoh: Butuh membawa tangga, lift mati, dll."></textarea>
                    </div>
                </form>
            </div>

            <div id="checkout-summary" style="background: var(--light-gray-bg); padding: 20px; border-radius: 8px; height: fit-content;">
                <h3>Ringkasan Pesanan</h3>
                <ul id="summary-items" style="list-style: none; margin-bottom: 1rem; border-bottom: 1px solid #c8ddf5; padding-bottom: 1rem;"></ul>
                <div style="font-size: 1.2rem; font-weight: bold; margin-bottom: 1.5rem;">
                    Total: <span id="summary-total">Rp 0</span>
                </div>
                <button id="download-quote-btn" style="width: 100%; padding: 10px; background: white; border: 2px solid var(--primary-color); color: var(--primary-color); font-weight: bold; border-radius: 5px; cursor: pointer; margin-bottom: 10px; font-family: 'DM Sans', sans-serif;">
                    📄 Download Penawaran (PDF)
                </button>
                <button id="confirm-order-btn" class="cta-button" style="width: 100%;">Buat Pesanan</button>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2025 NataDoc. All Rights Reserved.</p>
        <p>Email: contact.natadoc@gmail.com | Lokasi: Jatinangor, Jawa Barat</p>
    </footer>

    <!-- Modal Pembayaran -->
    <div id="payment-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <h3>Pilih Metode Pembayaran</h3>
                <button id="close-modal" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div id="modal-total-info"></div>
                <div class="payment-options">
                    <label class="payment-option">
                        <input type="radio" name="payment" value="bca" checked>
                        <div class="option-details">
                            <span class="bank-name">Transfer Bank BCA</span>
                            <span class="rek-num">No. Rek: 123-456-7890 (a.n NataDoc)</span>
                        </div>
                    </label>
                    <label class="payment-option">
                        <input type="radio" name="payment" value="mandiri">
                        <div class="option-details">
                            <span class="bank-name">Transfer Mandiri</span>
                            <span class="rek-num">No. Rek: 098-765-4321 (a.n NataDoc)</span>
                        </div>
                    </label>
                    <label class="payment-option">
                        <input type="radio" name="payment" value="qris">
                        <div class="option-details">
                            <span class="bank-name">QRIS (GoPay/OVO/Dana)</span>
                            <small>Scan QR code di langkah selanjutnya</small>
                        </div>
                    </label>
                </div>
                <div style="margin-top: 15px; border-top: 1px dashed #c8ddf5; padding-top: 10px;">
                    <label style="font-size: 0.9rem; display: block; margin-bottom: 5px;">Upload Bukti Transfer (Simulasi)</label>
                    <input type="file" style="font-size: 0.9rem;">
                </div>
            </div>
            <div class="modal-footer">
                <button id="pay-now-btn" class="cta-button" style="width: 100%;">Konfirmasi Pembayaran</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        // 1. Render Keranjang
        const cart = JSON.parse(localStorage.getItem('natadocCart')) || [];
        const summaryList = document.getElementById('summary-items');
        const summaryTotal = document.getElementById('summary-total');
        let total = 0;

        if (cart.length === 0) {
            summaryList.innerHTML = '<li style="color:#888;">Keranjang kosong</li>';
        } else {
            cart.forEach(item => {
                const li = document.createElement('li');
                li.style.marginBottom = '10px';
                li.innerHTML = `<small>${item.name}</small><br><strong>Rp ${item.price.toLocaleString('id-ID')}</strong>`;
                summaryList.appendChild(li);
                total += item.price;
            });
        }
        summaryTotal.textContent = `Rp ${total.toLocaleString('id-ID')}`;

        // 2. Download PDF
        document.getElementById('download-quote-btn').addEventListener('click', () => {
            const btn = document.getElementById('download-quote-btn');
            btn.innerHTML = 'Mengunduh...';
            btn.disabled = true;

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            const today = new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
            const refNum = 'ND-' + Date.now().toString().slice(-6);
            const address = document.getElementById('input-address').value || '-';
            const inputDate = document.getElementById('input-date').value;
            const date = inputDate
                ? new Date(inputDate).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' })
                : '-';
            const notes = document.getElementById('input-notes').value || '-';

            // Header biru
            doc.setFillColor(21, 63, 158);
            doc.rect(0, 0, 210, 35, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(20);
            doc.setFont('helvetica', 'bold');
            doc.text('NataDoc', 15, 16);
            doc.setFontSize(10);
            doc.setFont('helvetica', 'normal');
            doc.text('Menjaga Jejak, Membangun Kepercayaan', 15, 24);
            doc.text('contact.natadoc@gmail.com | Jatinangor, Jawa Barat', 15, 31);

            // Judul
            doc.setTextColor(21, 63, 158);
            doc.setFontSize(15);
            doc.setFont('helvetica', 'bold');
            doc.text('SURAT PENAWARAN LAYANAN', 15, 50);

            // Info dokumen
            doc.setFontSize(9);
            doc.setFont('helvetica', 'normal');
            doc.setTextColor(80, 80, 80);
            doc.text(`No. Referensi  : ${refNum}`, 15, 59);
            doc.text(`Tanggal         : ${today}`, 15, 65);
            doc.text(`Tgl Survey      : ${date}`, 15, 71);
            doc.text(`Lokasi           : ${address}`, 15, 77);
            doc.text(`Catatan         : ${notes}`, 15, 83);

            // Garis
            doc.setDrawColor(21, 63, 158);
            doc.setLineWidth(0.5);
            doc.line(15, 88, 195, 88);

            // Judul tabel
            doc.setFontSize(11);
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(21, 63, 158);
            doc.text('Rincian Layanan', 15, 97);

            // Header tabel
            doc.setFillColor(230, 241, 251);
            doc.rect(15, 101, 180, 8, 'F');
            doc.setFontSize(9);
            doc.setTextColor(21, 63, 158);
            doc.text('Nama Layanan', 18, 107);
            doc.text('Harga', 163, 107);

            // Baris layanan
            let y = 115;
            doc.setFont('helvetica', 'normal');
            doc.setTextColor(50, 50, 50);
            cart.forEach((item, i) => {
                if (i % 2 === 0) {
                    doc.setFillColor(247, 247, 247);
                    doc.rect(15, y - 5, 180, 8, 'F');
                }
                doc.text(item.name, 18, y);
                doc.text(`Rp ${item.price.toLocaleString('id-ID')}`, 158, y);
                y += 10;
            });

            // Total
            doc.setDrawColor(21, 63, 158);
            doc.line(15, y, 195, y);
            y += 8;
            doc.setFont('helvetica', 'bold');
            doc.setFontSize(11);
            doc.setTextColor(21, 63, 158);
            doc.text('TOTAL', 18, y);
            doc.text(`Rp ${total.toLocaleString('id-ID')}`, 158, y);

            // Info DP
            y += 6;
            doc.setFillColor(255, 243, 224);
            doc.rect(15, y, 180, 16, 'F');
            doc.setFontSize(9);
            doc.setTextColor(99, 56, 6);
            doc.setFont('helvetica', 'normal');
            doc.text('Pembayaran Awal (DP 50%):', 18, y + 7);
            doc.setFont('helvetica', 'bold');
            doc.text(`Rp ${(total * 0.5).toLocaleString('id-ID')}`, 158, y + 7);
            doc.setFont('helvetica', 'normal');
            doc.text('*Sisa 50% dilunasi setelah pekerjaan selesai.', 18, y + 13);

            // Catatan
            y += 26;
            doc.setFillColor(240, 246, 255);
            doc.rect(15, y, 180, 28, 'F');
            doc.setFontSize(9);
            doc.setTextColor(80, 80, 80);
            doc.setFont('helvetica', 'bold');
            doc.text('Catatan:', 18, y + 7);
            doc.setFont('helvetica', 'normal');
            doc.text('1. Penawaran ini bersifat estimasi dan dapat berubah setelah survey lapangan.', 18, y + 14);
            doc.text('2. Survey lapangan dilakukan GRATIS sebelum pengerjaan dimulai.', 18, y + 20);
            doc.text('3. Penawaran berlaku selama 14 hari sejak tanggal surat ini.', 18, y + 26);

            // Footer
            doc.setFillColor(21, 63, 158);
            doc.rect(0, 272, 210, 25, 'F');
            doc.setFontSize(9);
            doc.setTextColor(255, 255, 255);
            doc.text('Terima kasih telah mempercayakan pengelolaan arsip Anda kepada NataDoc.', 105, 281, { align: 'center' });
            doc.text('contact.natadoc@gmail.com | Jatinangor, Jawa Barat', 105, 288, { align: 'center' });

            doc.save(`Penawaran_NataDoc_${refNum}.pdf`);
            btn.innerHTML = '📄 Download Penawaran (PDF)';
            btn.disabled = false;
        });

        // 3. Buat Pesanan → buka modal
        const confirmBtn = document.getElementById('confirm-order-btn');
        const modal = document.getElementById('payment-modal');

        confirmBtn.addEventListener('click', () => {
            if (cart.length === 0) return alert('Pilih layanan dulu!');

            const formInputs = document.querySelectorAll('#checkout-form input[required], #checkout-form textarea[required]');
            let valid = true;
            formInputs.forEach(input => { if (!input.value) valid = false; });
            if (!valid) return alert('Mohon lengkapi Detail Lokasi & Jadwal terlebih dahulu.');

            const dpAmount = total * 0.5;
            document.getElementById('modal-total-info').innerHTML = `
                <div style="background: #f0f4f8; padding: 10px; border-radius: 5px; margin-bottom: 15px;">
                    <div style="display:flex; justify-content:space-between;">
                        <span>Total Proyek:</span>
                        <strong>Rp ${total.toLocaleString('id-ID')}</strong>
                    </div>
                    <div style="display:flex; justify-content:space-between; color: var(--secondary-color); margin-top: 5px;">
                        <span>Pembayaran Awal (DP 50%):</span>
                        <strong style="font-size: 1.2rem;">Rp ${dpAmount.toLocaleString('id-ID')}</strong>
                    </div>
                    <small style="display:block; margin-top:5px; color:#666;">*Sisa pembayaran dilunasi setelah pekerjaan selesai.</small>
                </div>
            `;
            modal.style.display = 'flex';
        });

        // 4. Tutup modal
        document.getElementById('close-modal').addEventListener('click', () => {
            modal.style.display = 'none';
        });
        window.onclick = (e) => { if (e.target == modal) modal.style.display = 'none'; };

        // 5. Konfirmasi bayar
        document.getElementById('pay-now-btn').addEventListener('click', () => {
            const btn = document.getElementById('pay-now-btn');
            btn.innerHTML = 'Memproses...';
            btn.disabled = true;
            setTimeout(() => {
                alert('Pembayaran Berhasil! Pesanan Anda telah dibuat.');
                localStorage.removeItem('natadocCart');
                window.location.href = 'tracking.html';
            }, 2000);
        });
    });
    </script>

</body>
</html>
