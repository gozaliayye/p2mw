<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - NataDoc</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
 <!-- SVG Sprite (sama persis dengan index.html) -->
    <svg width="0" height="0" style="position:absolute">
        <symbol id="icon-chat" viewBox="0 0 24 24" fill="currentColor">
            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/>
        </symbol>
        <symbol id="icon-bell" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
        </symbol>
        <symbol id="icon-user" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </symbol>
    </svg>
 
    <header>
        <nav class="container">
            <a href="index.html" class="brand-logo">
                <img src="assets/images/logo-natadoc.png" alt="NataDoc Logo">
                <span class="logo-text">Nata<span>Doc</span></span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Beranda</a></li>
                <li><a href="layanan.html">Layanan Kami</a></li>
                <li><a href="konsultasi.html">
                    <svg class="icon nav-icon"><use xlink:href="#icon-chat"></use></svg>
                    Konsultasi
                </a></li>
                <li><a href="notifications.html" title="Notifikasi">
                    <svg class="icon nav-icon"><use xlink:href="#icon-bell"></use></svg>
                </a></li>
                <li><a href="profile.html" title="Profil">
                    <svg class="icon nav-icon"><use xlink:href="#icon-user"></use></svg>
                </a></li>
                
            </ul>
        </nav>
    </header>

    <main class="container page-content">
        <div class="form-card">
            <h2>Notifikasi Anda</h2>
            <div id="notification-list">
                </div>
            <button class="cta-button" id="mark-read" style="margin-top: 2rem;">Tandai Semua Dibaca</button>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const list = document.getElementById('notification-list');
            // Data dummy awal kalau kosong
            const dummy = [
                { title: "Selamat Datang", message: "Akun NataDoc berhasil dibuat.", time: "Kemarin", read: true }
            ];

            let notifs = JSON.parse(localStorage.getItem('natadocNotifications'));
            if(!notifs) {
                notifs = dummy;
                localStorage.setItem('natadocNotifications', JSON.stringify(notifs));
            }

            list.innerHTML = '';
            if(notifs.length === 0) list.innerHTML = '<p>Tidak ada notifikasi.</p>';

            notifs.forEach(n => {
                const div = document.createElement('div');
                div.className = `notification-item ${n.read ? '' : 'unread'}`;
                div.innerHTML = `
                    <span class="icon" style="font-size:1.5rem; margin-right:10px; color:var(--secondary-color)">🔔</span>
                    <div class="content">
                        <h4 style="margin:0; color:var(--primary-color)">${n.title}</h4>
                        <p style="margin:5px 0">${n.message}</p>
                        <small style="color:#888">${n.time}</small>
                    </div>
                `;
                list.appendChild(div);
            });

            document.getElementById('mark-read').addEventListener('click', () => {
                notifs.forEach(n => n.read = true);
                localStorage.setItem('natadocNotifications', JSON.stringify(notifs));
                location.reload();
            });
        });
    </script>
</body>
</html>
