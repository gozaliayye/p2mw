<main class="container page-content">
    <div class="form-card">
        <h2>Notifikasi Anda</h2>
        
        <div id="notification-list"></div>

        <button class="cta-button" id="mark-all-read-btn" style="margin-top: 2rem;">Tandai Semua Sudah Dibaca</button>
    </div>
</main>

<script src="assets/js/script.js"></script>
<script src="assets/js/auth.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const notifList = document.getElementById('notification-list');
        
        // Data Dummy awal (agar tidak kosong saat pertama buka)
        const defaultNotifs = [
            { title: "Balasan Konsultasi", message: "Admin telah membalas pesan Anda.", time: "10 menit lalu", read: true },
            { title: "Selamat Datang", message: "Akun Anda berhasil dibuat.", time: "1 hari lalu", read: true }
        ];

        // Ambil dari localStorage, kalau kosong pakai default
        let notifications = JSON.parse(localStorage.getItem('natadocNotifications'));
        if (!notifications) {
            notifications = defaultNotifs;
            localStorage.setItem('natadocNotifications', JSON.stringify(notifications));
        }

        // Render Notifikasi ke HTML
        notifList.innerHTML = '';
        notifications.forEach(notif => {
            const item = document.createElement('div');
            item.className = `notification-item ${notif.read ? '' : 'unread'}`;
            item.innerHTML = `
                <span class="icon" style="font-size: 1.5rem; margin-right: 15px; color: var(--secondary-color);">🔔</span> 
                <div class="content">
                    <h4 style="margin: 0; color: var(--primary-color);">${notif.title}</h4>
                    <p style="margin: 5px 0;">${notif.message}</p>
                    <small style="color: #888;">${notif.time}</small>
                </div>
            `;
            notifList.appendChild(item);
        });

        // Update tombol "Tandai Baca"
        document.getElementById('mark-all-read-btn').addEventListener('click', () => {
            notifications.forEach(n => n.read = true);
            localStorage.setItem('natadocNotifications', JSON.stringify(notifications));
            location.reload(); // Refresh halaman untuk lihat efeknya
        });
    });
</script>
